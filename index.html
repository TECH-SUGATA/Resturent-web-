<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FeastRush — Premium Food Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --bg:#04040A;--s1:#080810;--s2:#0E0E1A;--s3:#141420;--s4:#1C1C2C;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--border3:rgba(255,255,255,.18);
  /* Multi-color accent system */
  --gold:#F5A623;--gold2:#FFD166;--gold3:#FFE5A0;
  --coral:#FF6B6B;--coral2:#FF8E8E;
  --teal:#06D6A0;--teal2:#00F5C4;
  --violet:#7C3AED;--violet2:#A78BFA;
  --rose:#F43F5E;--rose2:#FB7185;
  --sky:#0EA5E9;--sky2:#38BDF8;
  --orange:#F97316;--orange2:#FB923C;
  --pink:#EC4899;--pink2:#F472B6;
  --lime:#84CC16;--lime2:#A3E635;
  --text:#F8F4EE;--muted:#9090A8;--muted2:#58586E;--muted3:#3A3A50;
  --glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.06);--glass3:rgba(255,255,255,.09);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif}
.syne{font-family:'Syne',sans-serif}

/* AURORA BG */
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(120px);animation:blobFloat 16s ease-in-out infinite alternate;will-change:transform}
.b1{width:800px;height:800px;background:radial-gradient(circle,rgba(245,166,35,.12),transparent 70%);top:-300px;left:-200px;animation-duration:18s}
.b2{width:700px;height:700px;background:radial-gradient(circle,rgba(255,107,107,.1),transparent 70%);bottom:-200px;right:-100px;animation-duration:14s;animation-delay:-5s}
.b3{width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,.08),transparent 70%);top:35%;left:25%;animation-duration:20s;animation-delay:-3s}
.b4{width:500px;height:500px;background:radial-gradient(circle,rgba(6,214,160,.07),transparent 70%);bottom:15%;left:5%;animation-duration:15s;animation-delay:-8s}
.b5{width:400px;height:400px;background:radial-gradient(circle,rgba(14,165,233,.06),transparent 70%);top:20%;right:10%;animation-duration:22s;animation-delay:-11s}
.b6{width:350px;height:350px;background:radial-gradient(circle,rgba(236,72,153,.06),transparent 70%);bottom:40%;right:25%;animation-duration:17s;animation-delay:-6s}
@keyframes blobFloat{
  0%{transform:translate(0,0) scale(1)}25%{transform:translate(60px,-80px) scale(1.12)}
  50%{transform:translate(-50px,70px) scale(.92)}75%{transform:translate(90px,40px) scale(1.08)}
  100%{transform:translate(-30px,-60px) scale(1.04)}
}
.grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* PAGES */
.page{display:none;position:relative;z-index:2;min-height:100vh}
.page.active{display:block;animation:pageIn .5s cubic-bezier(.22,1,.36,1) both}
@keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* GLASS */
.gc{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:24px;backdrop-filter:blur(24px);transition:all .4s cubic-bezier(.22,1,.36,1)}
.gc:hover{background:rgba(255,255,255,.055);border-color:var(--border2);transform:translateY(-5px);box-shadow:0 24px 64px rgba(0,0,0,.6)}
.gcf{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(16px)}
.gcd{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px)}

/* BUTTONS */
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;font-weight:700;border:none;border-radius:14px;padding:14px 28px;cursor:pointer;font-family:'Syne',sans-serif;font-size:15px;display:inline-flex;align-items:center;gap:8px;transition:all .3s;position:relative;overflow:hidden;letter-spacing:.3px}
.btn-gold::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.25),transparent);opacity:0;transition:opacity .25s}
.btn-gold:hover::before{opacity:1}
.btn-gold:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(245,166,35,.4)}
.btn-gold:active{transform:translateY(0)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text);border-radius:14px;padding:13px 26px;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all .25s;letter-spacing:.3px}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);background:rgba(245,166,35,.06)}
.bico{width:44px;height:44px;border-radius:13px;background:var(--glass2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;color:var(--muted);font-size:16px;flex-shrink:0}
.bico:hover{background:rgba(245,166,35,.12);border-color:rgba(245,166,35,.35);color:var(--gold)}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:70px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(4,4,10,.75);backdrop-filter:blur(30px) saturate(180%);border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:.5px;background:linear-gradient(135deg,var(--gold),var(--coral),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* INPUTS */
.inp{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:14px;padding:14px 18px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;outline:none;transition:all .3s}
.inp:focus{border-color:var(--gold);background:rgba(245,166,35,.035);box-shadow:0 0 0 4px rgba(245,166,35,.07)}
.inp::placeholder{color:var(--muted2)}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;margin-bottom:8px;text-transform:uppercase;font-family:'Syne',sans-serif}
select.inp option{background:#141420}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;font-family:'Syne',sans-serif}
.bg-gold{background:rgba(245,166,35,.15);color:var(--gold);border:1px solid rgba(245,166,35,.3)}
.bg-teal{background:rgba(6,214,160,.12);color:var(--teal);border:1px solid rgba(6,214,160,.25)}
.bg-coral{background:rgba(255,107,107,.12);color:var(--coral);border:1px solid rgba(255,107,107,.25)}
.bg-violet{background:rgba(124,58,237,.12);color:var(--violet2);border:1px solid rgba(124,58,237,.25)}
.bg-sky{background:rgba(14,165,233,.12);color:var(--sky2);border:1px solid rgba(14,165,233,.25)}
.bg-rose{background:rgba(244,63,94,.12);color:var(--rose2);border:1px solid rgba(244,63,94,.25)}
.bg-pink{background:rgba(236,72,153,.12);color:var(--pink2);border:1px solid rgba(236,72,153,.25)}
.bg-lime{background:rgba(132,204,22,.12);color:var(--lime2);border:1px solid rgba(132,204,22,.25)}
.bg-orange{background:rgba(249,115,22,.12);color:var(--orange2);border:1px solid rgba(249,115,22,.25)}

/* FOOD CARD */
.fcard{border-radius:24px;overflow:hidden;background:rgba(255,255,255,.025);border:1px solid var(--border);cursor:pointer;transition:all .4s cubic-bezier(.22,1,.36,1);position:relative}
.fcard:hover{transform:translateY(-8px) scale(1.01);border-color:rgba(245,166,35,.3);box-shadow:0 28px 70px rgba(0,0,0,.6),0 0 0 1px rgba(245,166,35,.12),inset 0 1px 0 rgba(255,255,255,.07)}
.fcard-img{width:100%;height:210px;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.22,1,.36,1)}
.fcard:hover .fcard-img{transform:scale(1.07)}

/* MENU ITEM */
.mitem{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;overflow:hidden;display:flex;transition:all .3s;position:relative}
.mitem:hover{border-color:rgba(245,166,35,.25);background:rgba(255,255,255,.05);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.mitem-img{width:116px;min-width:116px;height:116px;object-fit:cover}
.mitem-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}

/* QTY */
.qty{display:flex;align-items:center;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:12px;overflow:hidden}
.qbtn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gold);font-size:18px;font-weight:700;transition:background .2s;border:none;background:transparent;font-family:'Syne',sans-serif}
.qbtn:hover{background:rgba(245,166,35,.22)}
.qn{min-width:30px;text-align:center;font-weight:700;font-size:14px;color:var(--text);font-family:'Syne',sans-serif}
.abtn{width:36px;height:36px;border-radius:10px;background:transparent;border:1.5px solid rgba(245,166,35,.45);color:var(--gold);font-size:22px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;font-family:'Syne',sans-serif}
.abtn:hover{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;border-color:transparent;transform:scale(1.12)}

/* CART */
#cpanel{position:fixed;top:0;right:-100%;width:min(460px,100vw);height:100vh;z-index:600;background:rgba(6,6,16,.97);backdrop-filter:blur(48px) saturate(180%);border-left:1px solid var(--border2);transition:right .5s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;overflow:hidden}
#cpanel.open{right:0;box-shadow:-20px 0 80px rgba(0,0,0,.8)}
#cov{position:fixed;inset:0;z-index:599;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .4s}
#cov.open{opacity:1;pointer-events:all}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:150;height:72px;display:flex;align-items:center;justify-content:space-around;background:rgba(4,4,10,.92);backdrop-filter:blur(30px);border-top:1px solid var(--border)}
.bni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s;color:var(--muted2);min-width:54px;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;font-family:'Syne',sans-serif}
.bni i{font-size:21px;transition:all .25s}
.bni.on{color:var(--gold)}
.bni.on i{filter:drop-shadow(0 0 8px rgba(245,166,35,.7))}
.bni:hover{color:var(--gold2)}

/* SEARCHBAR */
.srch{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.045);border:1.5px solid var(--border);border-radius:16px;padding:0 18px;height:52px;transition:all .3s}
.srch:focus-within{border-color:rgba(245,166,35,.45);background:rgba(245,166,35,.035);box-shadow:0 0 0 4px rgba(245,166,35,.07)}
.srch input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;flex:1}
.srch input::placeholder{color:var(--muted2)}

/* SCROLLBAR */
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:rgba(245,166,35,.25);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}
.scx{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.scx::-webkit-scrollbar{display:none}

/* PILL */
.pill{padding:8px 18px;border-radius:22px;white-space:nowrap;background:rgba(255,255,255,.045);border:1.5px solid var(--border);cursor:pointer;transition:all .22s;font-size:13px;font-weight:600;color:var(--muted);font-family:'Syne',sans-serif;letter-spacing:.2px}
.pill.on,.pill:hover{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.45);color:var(--gold)}

/* RATING */
.rchip{display:inline-flex;align-items:center;gap:4px;background:rgba(6,214,160,.1);color:var(--teal);padding:3px 10px;border-radius:9px;font-size:12px;font-weight:700;border:1px solid rgba(6,214,160,.22);font-family:'Syne',sans-serif}

/* PROGRESS */
.pbar{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:4px;transition:width .5s}

/* TOAST */
#toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,rgba(6,214,160,.95),rgba(0,180,130,.95));color:#000;padding:12px 22px;border-radius:50px;font-weight:700;font-size:14px;z-index:9999;opacity:0;transition:all .35s cubic-bezier(.22,1,.36,1);pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap;backdrop-filter:blur(24px);border:1px solid rgba(6,214,160,.4);box-shadow:0 8px 36px rgba(6,214,160,.35);font-family:'Syne',sans-serif;letter-spacing:.3px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* VEG */
.vd{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--teal);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.vd::after{content:'';width:7px;height:7px;background:var(--teal);border-radius:50%}
.nvd{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--coral);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.nvd::after{content:'';width:7px;height:7px;background:var(--coral);border-radius:50%}

/* MAP */
.maph{width:100%;height:200px;background:var(--s2);border-radius:20px;position:relative;overflow:hidden;border:1px solid var(--border)}
.mapg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px}
.mro{position:absolute;top:44%;left:0;right:0;height:18px;background:rgba(255,255,255,.06);border-radius:2px}
.mrv{position:absolute;top:0;bottom:0;left:38%;width:18px;background:rgba(255,255,255,.06);border-radius:2px}

/* ANIMATIONS */
@keyframes float{0%,100%{transform:translateY(0) translateX(-50%)}50%{transform:translateY(-10px) translateX(-50%)}}
@keyframes ping{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.8);opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes floatItem{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(10deg)}}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes spin{to{transform:rotate(360deg)}}

/* TRACKER */
.tstep{position:relative;padding:20px 0 20px 58px}
.tstep:not(:last-child)::before{content:'';position:absolute;left:20px;top:58px;bottom:0;width:2px;background:var(--border)}
.tstep.done:not(:last-child)::before{background:var(--teal)}
.ticon{position:absolute;left:0;top:20px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;z-index:1}
.ticon.done{background:var(--teal);color:#000}
.ticon.act{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;box-shadow:0 0 24px rgba(245,166,35,.55);animation:floatItem 2.5s ease-in-out infinite}
.ticon.pend{background:var(--s3);color:var(--muted2);border:2px solid var(--border)}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:2}
.abox{width:100%;max-width:480px;background:rgba(255,255,255,.025);border:1px solid var(--border2);border-radius:32px;padding:48px;backdrop-filter:blur(36px);box-shadow:0 50px 120px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.07)}

/* PROMO BANNER */
.promo{background:linear-gradient(135deg,#140a00,#200f00,#1a0008);border:1px solid rgba(245,166,35,.2);border-radius:26px;position:relative;overflow:hidden}
.promo::before{content:'';position:absolute;top:-60%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(245,166,35,.18),transparent 65%);pointer-events:none}
.promo::after{content:'';position:absolute;bottom:-40%;left:-5%;width:300px;height:300px;background:radial-gradient(circle,rgba(255,107,107,.12),transparent 65%);pointer-events:none}

/* GTEXT */
.gt{background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 30%,var(--coral) 60%,var(--rose2) 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite}

/* LAYOUT */
.pc{padding-top:82px;padding-bottom:95px;max-width:1360px;margin:0 auto}
.px{padding-left:20px;padding-right:20px}
.div{height:1px;background:var(--border);margin:20px 0}
.stitle{font-size:22px;font-weight:700;margin-bottom:18px;font-family:'Playfair Display',serif}

/* ERROR */
.ferr{color:var(--coral);font-size:12px;margin-top:5px;display:none;font-family:'Syne',sans-serif}
.ferr.on{display:block}
.inp.err{border-color:var(--coral)}

/* TOG */
.tog{position:relative;display:inline-block;width:48px;height:27px}
.tog input{opacity:0;width:0;height:0}
.togs{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--s3);transition:.3s;border-radius:27px;border:1px solid var(--border)}
.togs::before{position:absolute;content:'';height:21px;width:21px;left:2px;bottom:2px;background:#fff;transition:.3s;border-radius:50%}
.tog input:checked+.togs{background:var(--gold)}
.tog input:checked+.togs::before{transform:translateX(21px)}

/* EV CARD */
.evcard{border-radius:24px;overflow:hidden;background:rgba(255,255,255,.025);border:1px solid var(--border);transition:all .4s cubic-bezier(.22,1,.36,1)}
.evcard:hover{transform:translateY(-6px);border-color:rgba(245,166,35,.25);box-shadow:0 24px 60px rgba(0,0,0,.5)}

/* CART ITEM */
.citem{display:flex;gap:14px;padding:16px;border-bottom:1px solid var(--border)}
.citem:last-child{border-bottom:none}
.cimg{width:68px;height:68px;border-radius:14px;object-fit:cover;flex-shrink:0}

/* LANDING */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;position:relative;z-index:2}
.hring{position:absolute;border-radius:50%;border:1px solid rgba(245,166,35,.05);pointer-events:none}
.hr1{width:520px;height:520px}
.hr2{width:820px;height:820px;border-color:rgba(255,107,107,.04)}
.hr3{width:1120px;height:1120px;border-color:rgba(124,58,237,.03)}
.fitem{position:absolute;animation:floatItem 6s ease-in-out infinite;pointer-events:none;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}

/* STAGGER */
.stag>*{animation:slideUp .55s both}
.stag>*:nth-child(1){animation-delay:.04s}
.stag>*:nth-child(2){animation-delay:.09s}
.stag>*:nth-child(3){animation-delay:.14s}
.stag>*:nth-child(4){animation-delay:.19s}
.stag>*:nth-child(5){animation-delay:.24s}
.stag>*:nth-child(6){animation-delay:.29s}
.stag>*:nth-child(7){animation-delay:.34s}
.stag>*:nth-child(8){animation-delay:.39s}
.stag>*:nth-child(9){animation-delay:.44s}
.stag>*:nth-child(10){animation-delay:.49s}

/* CATEGORY ICONS */
.catbtn{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;min-width:72px;transition:all .25s}
.catbtn .cico{width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;fo
